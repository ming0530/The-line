<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>那條線｜終章</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/game.css">
</head>

<body>

<div id="cinematic" onclick="startGame()">
  <div class="cin-line"></div>
  <div class="cin-text">那條線｜終章</div>
  <div class="cin-line"></div>
    <div class="cin-text">隔天早上</div>
  <div class="cin-hint">▼</div>
</div>

<div id="game">
  <div class="game-bg" id="game-bg"></div>

  <div class="game-topbar">
    <div class="chapter-label" id="chapter-label">終章</div>
  </div>

  <div class="game-dialog" onclick="nextLine()">
    <div class="speaker-name narrator" id="speaker-name">旁白</div>

    <div class="dialog-box">
      <div class="dialog-text" id="dialog-text"></div>
      <div class="click-hint">▼ 點擊繼續</div>
    </div>
  </div>
</div>
<div id="door-info-screen" class="hidden">
  <div class="door-panel">
    <h2>走廊上的三扇門</h2>
    <p>小瑀停在走廊前。她不知道該先去哪裡。</p>

    <button onclick="openDoorInfo('counsel')">諮商輔導中心</button>
    <button onclick="openDoorInfo('gender')">學務處性平會</button>
    <button onclick="openDoorInfo('outside')">校外資源：勵馨基金會</button>

    <div id="door-info-text"></div>

    <button id="door-continue-btn" class="hidden" onclick="finishDoorInfo()">
      我想先去說說看
    </button>
  </div>
</div>

<div id="support-quiz-screen" class="hidden">
  <div class="support-panel">
    <h2 id="support-question"></h2>
    <div id="support-options"></div>
    <div id="support-feedback"></div>
  </div>
</div>

<div id="resource-paper-screen" class="hidden">
  <div class="resource-paper">
    <h2>諮商師給小瑀的那張紙</h2>
    <p>你和小瑀一起讀著紙上的資源。</p>
    <div class="resource-body">
      <div class="resource-list">
        <button onclick="openResource('counsel')">學校諮商中心</button>
        <button onclick="openResource('gender')">學務處性平會</button>
        <button onclick="openResource('hospital')">中壢天晟醫院</button>
        <button onclick="openResource('garden')">勵馨基金會（桃園）</button>
        <button onclick="openResource('police')">中壢分局 / 派出所</button>
      </div>
      <div class="resource-detail" id="resource-text">
        點選左側機構查看說明。
      </div>
    </div>
    <button id="resource-continue-btn" class="hidden" onclick="finishResourcePaper()">
      繼續
    </button>
  </div>
</div>


<!-- ending -->
<audio id="bgm" src="music/end.mp3" loop></audio>
<button class="music-btn" id="music-btn" onclick="toggleMusic()">♪</button>

</div>

const bgm = document.getElementById('bgm');
const btn = document.getElementById('music-btn');
let muted = false;

document.addEventListener('click', () => {

}, { once: true });

function toggleMusic() {
  muted = !muted;
  bgm.muted = muted;
  btn.style.opacity = muted ? '0.4' : '1';
}
</script>

function startGame() {
  const cin = document.getElementById('cinematic');
  const game = document.getElementById('game');

  cin.style.transition = 'opacity 0.6s ease';
  cin.style.opacity = '0';

  setTimeout(() => {
    cin.style.display = 'none';
    game.classList.add('visible');
    renderLine(0);
  }, 600);
}

function renderLine(index) {
  const line = lines[index];

  if (line.bg) {
    document.getElementById('game-bg').style.backgroundImage = `url('${line.bg}')`;
  }

  const speakerEl = document.getElementById('speaker-name');

  if (line.type === 'narrate') {
    speakerEl.textContent = '旁白';
    speakerEl.className = 'speaker-name narrator';
  } else {
    speakerEl.textContent = line.speaker;
        if (line.speaker === '阿哲') {
        speakerEl.className = 'speaker-name azhe';
        }
        else if (line.speaker === '小瑀') {
        speakerEl.className = 'speaker-name xiaoyu';
        }
        else {
        speakerEl.className = 'speaker-name';
        }
  }

  document.getElementById('dialog-text').innerHTML =
    line.text.replace(/\n/g, '<br>');
}

function nextLine() {
  if (isChoosing) return;

  if (endingMode) {
    if (endingIndex < endingLines.length - 1) {
      endingIndex++;

      if (endingLines[endingIndex].type === 'resourcePaper') {
        showResourcePaper();
      } else {
        renderLineObject(endingLines[endingIndex]);
      }

    } else {
      showEndingScreen();
    }
    return;
  }

  if (current < lines.length - 1) {
    current++;

    if (lines[current].type === 'doorInfo') {
      showDoorInfo();
      return;
    }

    if (lines[current].type === 'supportQuiz') {
      showSupportQuiz();
      return;
    }

    renderLine(current);

  } else {
    showEndingLines();
  }
}

function showSupportQuiz() {
  isChoosing = true;
  supportIndex = 0;
  supportCorrect = 0;
  document.getElementById('support-quiz-screen').classList.remove('hidden');
  renderSupportQuestion();
}

function renderSupportQuestion() {
  const q = supportQuestions[supportIndex];

  document.getElementById('support-question').innerHTML = q.question;

  document.getElementById('support-options').innerHTML = `
    <button onclick="answerSupport('A')">A. ${q.options.A}</button>
    <button onclick="answerSupport('B')">B. ${q.options.B}</button>
    <button onclick="answerSupport('C')">C. ${q.options.C}</button>
  `;

  document.getElementById('support-feedback').innerHTML = '';
}

function answerSupport(option) {
  const q = supportQuestions[supportIndex];

  if (option === q.correct) {
    supportCorrect++;
  }

  document.getElementById('support-feedback').innerHTML = q.feedback[option];

  setTimeout(() => {
    supportIndex++;

    if (supportIndex < supportQuestions.length) {
      renderSupportQuestion();
    } else {
      finishSupportQuiz();
    }
  }, 1800);
}

function finishSupportQuiz() {
  localStorage.setItem('supportCorrect', supportCorrect);

  document.getElementById('support-quiz-screen').classList.add('hidden');
  isChoosing = false;

  let resultLine;

  if (supportCorrect === 3) {
    resultLine = {
      type: 'dialog',
      speaker: '小瑀',
      text: '好。'
    };
  } else if (supportCorrect === 2) {
    resultLine = {
      type: 'narrate',
      text: '小瑀有一點猶豫，但還是點了點頭。'
    };
  } else {
    resultLine = {
      type: 'dialog',
      speaker: '小瑀',
      text: '嗯，但那個笑有點空。'
    };
  }

  lines.splice(current + 1, 0,
    resultLine,
    {
      type: 'narrate',
      text: '小瑀深吸一口氣，走進去了。'
    }
  );

  current++;
  renderLine(current);
}

  endingLines.splice(endingIndex + 1, 0,

      type: 'dialog',
      speaker: '小瑀',
      text: '諮商師說……不一定要現在就決定什麼。知道有這些地方在，就夠了。'
    },
    {
      type: 'narrate',
      text: '她停了一下。'
    },
    {
      type: 'dialog',
      speaker: '小瑀',
      text: '她說，這五個地方，不是你一定要走遍的清單。而是在你準備好的時候，讓你知道：每一扇門，都是打開著的。'
    }
  );

  endingIndex++;
  renderLineObject(endingLines[endingIndex]);
}

function renderLineObject(line) {
  if (line.bg) {
    document.getElementById('game-bg').style.backgroundImage = `url('${line.bg}')`;
  }

  const speakerEl = document.getElementById('speaker-name');

  if (line.type === 'narrate') {
    speakerEl.textContent = '旁白';
    speakerEl.className = 'speaker-name narrator';
  } else {
    speakerEl.textContent = line.speaker;

    if (line.speaker === '阿哲') {
      speakerEl.className = 'speaker-name azhe';
    } else if (line.speaker === '小瑀') {
      speakerEl.className = 'speaker-name xiaoyu';
    } else {
      speakerEl.className = 'speaker-name';
    }
  }

  document.getElementById('dialog-text').innerHTML =
    line.text.replace(/\n/g, '<br>');
}


function showEndingLines() {

  endingMode = true;
  endingIndex = 0;

  renderLineObject(endingLines[endingIndex]);
}

function buildVariants1(nightRoad, bus, support) {
  const lines = [];
  if (nightRoad === 'A') lines.push({ type: 'dialog', speaker: '小瑀', text: '你那天在紅燈口問我還好嗎，我一直記得。那時候我覺得，至少有一個人注意到了。' });
  if (bus === 'A') lines.push({ type: 'dialog', speaker: '小瑀', text: '還有那次在公車上，你走過來說「欸小瑀你也在」——我知道你是故意的。謝謝你。' });
  else if (bus === 'B') lines.push({ type: 'dialog', speaker: '小瑀', text: '那次公車上你站過來，你以為我沒注意到，但我有。' });
  if (support === 3) lines.push({ type: 'dialog', speaker: '小瑀', text: '你在門口說的那些話，我後來一直在想。你說我當然有資格去——我那時候真的需要有人這樣告訴我。' });
  else if (support === 2) lines.push({ type: 'dialog', speaker: '小瑀', text: '你陪我去那天，我很慶幸你在。' });
  return lines;
}

function buildVariants2(nightRoad, bus, support) {
  const lines = [];
  if (nightRoad === 'A') lines.push({ type: 'dialog', speaker: '小瑀', text: '你那天在紅燈口問我，我當時說還好。其實不太好。但你問了，這件事我記得。' });
  else lines.push({ type: 'dialog', speaker: '小瑀', text: '有時候我在想，如果那天有人問我一句就好了。' });
  if (bus === 'A' || bus === 'B') lines.push({ type: 'dialog', speaker: '小瑀', text: '那次公車上你過來——我知道你看到了。謝謝你沒有假裝沒看見。' });
  else lines.push({ type: 'dialog', speaker: '小瑀', text: '那次公車上其實很難受。我一直等有人過來，但沒有。' });
  if (support === 3) lines.push({ type: 'dialog', speaker: '小瑀', text: '你在門口說的話讓我比較放心去。雖然你有一次沒有出現，但那天你在。' });
  return lines;
}

function buildVariants3(nightRoad, bus, support) {
  const lines = [];
  if (nightRoad === 'A') lines.push({ type: 'narrate', text: '你想起那天紅燈口，你問她還好嗎。她說還好。你以為真的還好。' });
  else lines.push({ type: 'narrate', text: '你想起那天宵夜街，你們走出來，你沒有說什麼。你不確定說了會怎樣。' });
  if (bus === 'A' || bus === 'B') lines.push({ type: 'narrate', text: '你想起那次公車上你走過去。你做了一件事。但那之後，你沒有再跟進。' });
  else lines.push({ type: 'narrate', text: '你想起那次公車上你站在原地。你告訴自己等等看。後來你忘了等。' });
  if (support <= 1) lines.push({ type: 'narrate', text: '你陪她去那天，你不確定自己說的對不對。她還是走進去了。你不知道那對她來說是什麼感覺。' });
  return lines;
}

function buildVariants4(nightRoad, bus, support) {
  const lines = [];
  if (nightRoad === 'A') lines.push({ type: 'narrate', text: '你想起那天你在紅燈口問她還好嗎。她說還好。你點了頭，沒有再追問。' });
  else lines.push({ type: 'narrate', text: '你想起那天宵夜街，你們走出來，你沒有說什麼。那時候你在想別的事。' });
  if (bus === 'A' || bus === 'B') lines.push({ type: 'narrate', text: '你那次在公車上走過去。你做了一件事。但下車之後，你沒有再問她。' });
  else lines.push({ type: 'narrate', text: '你那次在公車上站在原地。你想說也許沒那麼嚴重。你現在想，也許你錯了。' });
  if (support === 3) lines.push({ type: 'narrate', text: '你陪她去那天，你說了對的話。但那一次之前，你沒有出現過。一次，不夠。' });
  else lines.push({ type: 'narrate', text: '你陪她去那天，你站在外面等。你不確定自己說的話有沒有幫到她。現在想，可能沒有。' });
  return lines;
}
